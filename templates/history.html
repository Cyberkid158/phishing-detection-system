<!DOCTYPE html>
<html>
<head>
    <title>Scan History</title>
</head>
<body>

<h1>Scan History</h1>

<table border="1" cellpadding="10">

<tr>
    <th>ID</th>
    <th>URL</th>
    <th>Result</th>
    <th>Date</th>
</tr>

{% for row in data %}

<tr>
    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
    <td>{{ row[3] }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
